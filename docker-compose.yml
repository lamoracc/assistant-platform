services:
  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://assistant:assistant@postgres:5432/assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-document_chunks}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      INGESTION_EMBED_BATCH_CHUNKS: ${INGESTION_EMBED_BATCH_CHUNKS:-256}
      HF_HOME: ${HF_HOME:-/root/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/.cache/huggingface/transformers}
      SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/root/.cache/huggingface/sentence-transformers}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-26214400}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      RETRIEVAL_CANDIDATE_K: ${RETRIEVAL_CANDIDATE_K:-80}
      RETRIEVAL_FINAL_K: ${RETRIEVAL_FINAL_K:-8}
      RETRIEVAL_KEYWORD_CANDIDATE_K: ${RETRIEVAL_KEYWORD_CANDIDATE_K:-80}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.55}
      RETRIEVAL_NEAR_DUPLICATE_DEDUPE: ${RETRIEVAL_NEAR_DUPLICATE_DEDUPE:-true}
      RETRIEVAL_NEAR_DUPLICATE_THRESHOLD: ${RETRIEVAL_NEAR_DUPLICATE_THRESHOLD:-0.92}
      RETRIEVAL_MAX_NEAR_DUPLICATES_PER_GROUP: ${RETRIEVAL_MAX_NEAR_DUPLICATES_PER_GROUP:-1}
      MAX_CONTEXT_CHARS: ${MAX_CONTEXT_CHARS:-12000}
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-16}
      RERANKER_TOP_N: ${RERANKER_TOP_N:-24}
      RERANKER_WEIGHT: ${RERANKER_WEIGHT:-0.15}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-}
      PRESERVE_SOURCE_TERMS_INSTRUCTION: ${PRESERVE_SOURCE_TERMS_INSTRUCTION:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - ./data:/data
      - hf_cache:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker-ingest:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assistant}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://assistant:assistant@postgres:5432/assistant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-document_chunks}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      INGESTION_EMBED_BATCH_CHUNKS: ${INGESTION_EMBED_BATCH_CHUNKS:-256}
      HF_HOME: ${HF_HOME:-/root/.cache/huggingface}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE:-/root/.cache/huggingface/transformers}
      SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/root/.cache/huggingface/sentence-transformers}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      RETRIEVAL_CANDIDATE_K: ${RETRIEVAL_CANDIDATE_K:-80}
      RETRIEVAL_FINAL_K: ${RETRIEVAL_FINAL_K:-8}
      RETRIEVAL_KEYWORD_CANDIDATE_K: ${RETRIEVAL_KEYWORD_CANDIDATE_K:-80}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.55}
      RETRIEVAL_NEAR_DUPLICATE_DEDUPE: ${RETRIEVAL_NEAR_DUPLICATE_DEDUPE:-true}
      RETRIEVAL_NEAR_DUPLICATE_THRESHOLD: ${RETRIEVAL_NEAR_DUPLICATE_THRESHOLD:-0.92}
      RETRIEVAL_MAX_NEAR_DUPLICATES_PER_GROUP: ${RETRIEVAL_MAX_NEAR_DUPLICATES_PER_GROUP:-1}
      MAX_CONTEXT_CHARS: ${MAX_CONTEXT_CHARS:-12000}
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-16}
      RERANKER_TOP_N: ${RERANKER_TOP_N:-24}
      RERANKER_WEIGHT: ${RERANKER_WEIGHT:-0.15}
      ASSISTANT_SYSTEM_PROMPT: ${ASSISTANT_SYSTEM_PROMPT:-}
      PRESERVE_SOURCE_TERMS_INSTRUCTION: ${PRESERVE_SOURCE_TERMS_INSTRUCTION:-}
      INGESTION_WORKER_POLL_SECONDS: ${INGESTION_WORKER_POLL_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - ./data:/data
      - hf_cache:/root/.cache/huggingface
    command: python -m app.workers.ingestion_worker

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
